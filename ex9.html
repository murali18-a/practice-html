<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Local Community Event Portal</title>
</head>
<body>
    <nav>
        <a href="#home">Home</a>
        <a href="#events">Events</a>
        <a href="#contact">Contact</a>
    </nav>
    
    <main>
        <section id="home">
            <h1>Welcome to Our Community Event Portal</h1>
            <p>Find and register for exciting local events</p>
        </section>
        
        <section id="events">
            <h1>Find Nearby Events</h1>
            <button onclick="findNearbyEvents()">Find Nearby Events</button>
            
            <div id="geolocation-result"></div>
            <div class="error-message" id="errorMessage"></div>
        </section>
        
        <section id="contact">
            <h1>Contact Us</h1>
            <p>Questions? Contact us through the Help page</p>
        </section>
    </main>
    
    <footer>
        <p>&copy; 2024 Local Community Event Portal. All rights reserved.</p>
    </footer>

    <script>
        function findNearbyEvents() {
            const geolocationResult = document.getElementById('geolocation-result');
            const errorMessage = document.getElementById('errorMessage');
            
            geolocationResult.classList.remove('show');
            
            if (!navigator.geolocation) {
                errorMessage.innerHTML = 'Geolocation is not supported.';
                errorMessage.classList.add('show');
                return;
            }
            
            const options = {
                enableHighAccuracy: true,
                timeout: 10000,
                maximumAge: 0
            };
            
            navigator.geolocation.getCurrentPosition(
                function(position) {
                    const latitude = position.coords.latitude;
                    const longitude = position.coords.longitude;
                    const accuracy = position.coords.accuracy;
                    
                    geolocationResult.innerHTML = `
                        <h3>Your Location:</h3>
                        <p><strong>Latitude:</strong> ${latitude.toFixed(6)}</p>
                        <p><strong>Longitude:</strong> ${longitude.toFixed(6)}</p>
                        <p><strong>Accuracy:</strong> ±${accuracy.toFixed(0)} meters</p>
                    `;
                    geolocationResult.classList.add('show');
                },
                function(error) {
                    let errorMsg = 'An error occurred.';
                    
                    if (error.code === error.PERMISSION_DENIED) {
                        errorMsg = 'Location access denied.';
                    } else if (error.code === error.POSITION_UNAVAILABLE) {
                        errorMsg = 'Location information unavailable.';
                    } else if (error.code === error.TIMEOUT) {
                        errorMsg = 'Location request timed out.';
                    }
                    
                    errorMessage.innerHTML = errorMsg;
                    errorMessage.classList.add('show');
                },
                options
            );
        }
    </script>
</body>
</html>
