<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Local Community Event Portal</title>
</head>
<body>
    <nav>
        <a href="#home">Home</a>
        <a href="#events">Events</a>
        <a href="#contact">Contact</a>
    </nav>
    
    <main>
        <section id="home">
            <h1>Welcome to Our Community Event Portal</h1>
            <p>Find and register for exciting local events</p>
        </section>
        
        <section id="events">
            <h1>Event Promo Video</h1>
            <video width="100%" controls oncanplay="handleVideoCanPlay()">
                <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4">
                Your browser does not support video.
            </video>
            
            <div class="video-status" id="videoStatus"></div>
        </section>
        
        <section id="contact">
            <h1>Contact Us</h1>
            <p>Questions? Contact us through the Help page</p>
        </section>
    </main>
    
    <footer>
        <p>&copy; 2024 Local Community Event Portal. All rights reserved.</p>
    </footer>

    <script>
        function handleVideoCanPlay() {
            const videoStatus = document.getElementById('videoStatus');
            videoStatus.classList.add('show');
            
            setTimeout(() => {
                videoStatus.classList.remove('show');
            }, 2000);
        }
    </script>
</body>
</html>
