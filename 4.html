<!DOCTYPE html>
<html>
<head>

</head>
<body>

<table border="1">
    <caption>Community Event Gallery</caption>

    <tr>
        <td>
            <img src="img.jpg" alt="Event1" title="Music Event" class="imgStyle">

        <td>

        <td>

    <tr>
        <td>
            <img src="img.jpg" alt="Event4" title="Dance Event" class="imgStyle">

        </td>

        <td>
            <img src="img.jpg" alt="Event5" title="Art Event" class="imgStyle">

        </td>

        <td>
            <img src="img.jpg" alt="Event6" title="Book Fair" class="imgStyle">

        </td>

</table>

</body>
</html>
