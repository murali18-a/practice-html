<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Local Community Event Portal</title>
</head>
<body>
    <nav>
        <a href="#home">Home</a>
        <a href="#events">Events</a>
        <a href="#contact">Contact</a>
    </nav>
    
    <main>
        <section id="home">
            <h1>Welcome to Our Community Event Portal</h1>
            <p>Find and register for exciting local events</p>
        </section>
        
        <section id="events">
            <h1>Your Event Preferences</h1>
            <div class="form-group">
                <label for="preferenceSelect">Preferred Event Type</label>
                <select id="preferenceSelect" onchange="saveEventPreference()">
                    <option value="">-- Select an Event Type --</option>
                    <option value="music">Music Festival</option>
                    <option value="sports">Sports Tournament</option>
                    <option value="art">Art Fair</option>
                    <option value="food">Food Drive</option>
                    <option value="gardening">Gardening Workshop</option>
                    <option value="book">Book Club</option>
                </select>
            </div>
            
            <div id="savedPreference" style="display: none; padding: 15px; background-color: #d4edda; border-radius: 4px; margin: 15px 0;">
                <p>Your saved preference: <strong id="preferenceText"></strong></p>
            </div>
            
            <button onclick="clearAllPreferences()" class="secondary">Clear All Preferences</button>
            <output id="preferenceOutput"></output>
        </section>
        
        <section id="contact">
            <h1>Contact Us</h1>
            <p>Questions? Contact us through the Help page</p>
        </section>
    </main>
    
    <footer>
        <p>&copy; 2024 Local Community Event Portal. All rights reserved.</p>
    </footer>

    <script>
        function saveEventPreference() {
            const selected = document.getElementById('preferenceSelect').value;
            if (selected) {
                localStorage.setItem('preferredEventType', selected);
                
                const events = {
                    music: 'Music Festival',
                    sports: 'Sports Event',
                    art: 'Art Fair',
                    food: 'Food Drive',
                    gardening: 'Gardening Workshop',
                    book: 'Book Club'
                };
                
                document.getElementById('preferenceText').textContent = events[selected];
                document.getElementById('savedPreference').style.display = 'block';
                
                const output = document.getElementById('preferenceOutput');
                output.innerHTML = 'Your preference has been saved!';
                output.classList.add('show');
                
                setTimeout(() => {
                    output.classList.remove('show');
                }, 2000);
            }
        }
        
        function clearAllPreferences() {
            localStorage.clear();
            sessionStorage.clear();
            
            document.getElementById('savedPreference').style.display = 'none';
            
            const output = document.getElementById('preferenceOutput');
            output.innerHTML = 'All preferences cleared!';
            output.classList.add('show');
            
            setTimeout(() => {
                output.classList.remove('show');
            }, 2000);
        }
    </script>
</body>
</html>
