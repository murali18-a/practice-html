<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Local Community Event Portal</title>
    <style>
        form {
            background-color: white;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            margin: 20px 0;
        }
        
       .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #2c3e50;
        }
        
        input[type="text"],
        input[type="email"],
        input[type="date"],
        input[type="tel"],
        select,
        textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #bdc3c7;
            border-radius: 4px;
            font-size: 14px;
            font-family: Arial, sans-serif;
        }
        
        textarea {
            resize: vertical;
            min-height: 100px;
        }
    </style>
</head>
<body>
    <nav>
        <a href="#home">Home</a>
        <a href="#events">Events</a>
        <a href="#contact">Contact</a>
    </nav>
    
    <main>
        <section id="home">
            <h1>Welcome to Our Community Event Portal</h1>
            <p>Find and register for exciting local events</p>
        </section>
        
        <section id="events">
            <h1>Event Feedback</h1>
            <form>
                <div class="form-group">
                    <label for="selectedEvent">Which event did you attend?</label>
                    <select id="selectedEvent">
                        <option value="">-- Select an Event --</option>
                        <option value="music">Music Festival</option>
                        <option value="sports">Sports Tournament</option>
                        <option value="art">Art Fair</option>
                        <option value="food">Food Drive</option>
                        <option value="gardening">Gardening Workshop</option>
                        <option value="book">Book Club</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="feedbackText">Your Feedback</label>
                    <textarea id="feedbackText" placeholder="Share your thoughts"></textarea>
                </div>
                
                <button type="button" onclick="submitFeedback()">Submit Feedback</button>
            </form>
            
            <output id="feedbackOutput"></output>
        </section>
        
        <section id="contact">
            <h1>Contact Us</h1>
            <p>Questions? Contact us through the Help page</p>
        </section>
    </main>
    
    <footer>
        <p>&copy; 2024 Local Community Event Portal. All rights reserved.</p>
    </footer>

    <script>
        function submitFeedback() {
            const feedbackText = document.getElementById('feedbackText').value;
            
            if (!feedbackText) {
                alert('Please provide feedback');
                return;
            }
            
            const output = document.getElementById('feedbackOutput');
            output.innerHTML = 'Thank you for your feedback!';
            output.classList.add('show');
            
            setTimeout(() => {
                output.classList.remove('show');
                document.getElementById('feedbackForm').reset();
            }, 3000);
        }
    </script>
</body>
</html>
