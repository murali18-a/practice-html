<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 9.1: All Button Contextual Classes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <h1 class="mb-5">Bootstrap Button Contextual Classes</h1>

        <h2 class="mt-4">Solid Buttons</h2>
        <div class="mb-3">
            <button class="btn btn-primary me-2">Primary</button>
            <button class="btn btn-secondary me-2">Secondary</button>
            <button class="btn btn-success me-2">Success</button>
            <button class="btn btn-danger me-2">Danger</button>
            <button class="btn btn-warning me-2">Warning</button>
            <button class="btn btn-info me-2">Info</button>
            <button class="btn btn-light me-2">Light</button>
            <button class="btn btn-dark">Dark</button>
        </div>

        <h2 class="mt-4">Outline Buttons</h2>
        <div class="mb-3">
            <button class="btn btn-outline-primary me-2">Outline Primary</button>
            <button class="btn btn-outline-secondary me-2">Outline Secondary</button>
            <button class="btn btn-outline-success me-2">Outline Success</button>
            <button class="btn btn-outline-danger me-2">Outline Danger</button>
            <button class="btn btn-outline-warning me-2">Outline Warning</button>
            <button class="btn btn-outline-info me-2">Outline Info</button>
            <button class="btn btn-outline-light me-2" style="border: 1px solid #ccc;">Outline Light</button>
            <button class="btn btn-outline-dark">Outline Dark</button>
        </div>

        <h2 class="mt-4">Button Sizes</h2>
        <div class="mb-3">
            <button class="btn btn-primary btn-lg me-2">Large Button</button>
            <button class="btn btn-primary me-2">Normal Button</button>
            <button class="btn btn-primary btn-sm">Small Button</button>
        </div>

        <h2 class="mt-4">Disabled Buttons</h2>
        <div class="mb-3">
            <button class="btn btn-primary me-2" disabled>Disabled Primary</button>
            <button class="btn btn-secondary me-2" disabled>Disabled Secondary</button>
            <a class="btn btn-primary me-2" href="#" tabindex="-1" role="button" aria-disabled="true">Disabled Link</a>
        </div>

        <h2 class="mt-4">Block Buttons (Full Width)</h2>
        <div class="mb-3">
            <button class="btn btn-primary w-100 mb-2">Full Width Button 1</button>
            <button class="btn btn-secondary w-100 mb-2">Full Width Button 2</button>
            <button class="btn btn-success w-100">Full Width Button 3</button>
        </div>

        <h2 class="mt-4">Active State</h2>
        <div class="mb-3">
            <button class="btn btn-primary active me-2" aria-pressed="true">Active Primary</button>
            <button class="btn btn-secondary active">Active Secondary</button>
        </div>

        <h2 class="mt-4">Toggle Buttons</h2>
        <div class="mb-3">
            <input type="checkbox" class="btn-check" id="btn-check-1" checked>
            <label class="btn btn-primary" for="btn-check-1">Checked</label>

            <input type="checkbox" class="btn-check" id="btn-check-2">
            <label class="btn btn-primary" for="btn-check-2">Unchecked</label>

            <input type="radio" class="btn-check" name="options" id="option1" checked>
            <label class="btn btn-secondary" for="option1">Radio 1</label>

            <input type="radio" class="btn-check" name="options" id="option2">
            <label class="btn btn-secondary" for="option2">Radio 2</label>
        </div>

        <h2 class="mt-4">Icon-like Buttons</h2>
        <div class="mb-3">
            <button class="btn btn-primary">✏️ Edit</button>
            <button class="btn btn-danger ms-2">🗑️ Delete</button>
            <button class="btn btn-success ms-2">💾 Save</button>
            <button class="btn btn-warning ms-2">⚠️ Warning</button>
        </div>

        <h2 class="mt-4">Button Dropdown</h2>
        <div class="mb-3">
            <div class="btn-group" role="group">
                <button type="button" class="btn btn-primary">Left</button>
                <button type="button" class="btn btn-primary">Middle</button>
                <button type="button" class="btn btn-primary">Right</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
