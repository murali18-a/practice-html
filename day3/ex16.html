<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 8.2: Login Form with form-floating</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container-fluid" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh;">
        <div class="row justify-content-center align-items-center" style="min-height: 100vh;">
            <div class="col-md-5">
                <div class="card shadow-lg">
                    <div class="card-body p-5">
                        <h2 class="text-center mb-4">Login</h2>

                        <form>
                            <div class="form-floating mb-3">
                                <input type="email" class="form-control" id="floatingEmail" placeholder="name@example.com" required>
                                <label for="floatingEmail">Email Address</label>
                            </div>

                            <div class="form-floating mb-3">
                                <input type="password" class="form-control" id="floatingPassword" placeholder="Password" required>
                                <label for="floatingPassword">Password</label>
                            </div>

                            <div class="form-check mb-3">
                                <input class="form-check-input" type="checkbox" id="rememberMe">
                                <label class="form-check-label" for="rememberMe">
                                    Remember me
                                </label>
                            </div>

                            <button type="submit" class="btn btn-primary w-100 mb-3">Login</button>

                            <!-- Forgot Password Link -->
                            <div class="text-center mb-3">
                                <a href="#" class="text-decoration-none">Forgot Password?</a>
                            </div>

                            <div class="mb-3 text-center">
                                <span class="text-muted">OR</span>
                            </div>

                            <button type="button" class="btn btn-outline-danger w-100 mb-2">
                                Login with Google
                            </button>
                            <button type="button" class="btn btn-outline-primary w-100 mb-3">
                                Login with Facebook
                            </button>

                            <div class="text-center">
                                <p class="mb-0">
                                    Don't have an account? <a href="#" class="text-decoration-none">Sign up</a>
                                </p>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="container mt-5">
        <h3 class="mb-4">Alternative Floating Input Examples</h3>

        <div class="row">
            <div class="col-md-6">
                <h5>With Icons</h5>
                <div class="form-floating mb-3">
                    <input type="text" class="form-control" id="floatingUsername" placeholder="username">
                    <label for="floatingUsername">👤 Username</label>
                </div>
            </div>

            <div class="col-md-6">
                <h5>Multiple Fields</h5>
                <div class="form-floating mb-3">
                    <input type="text" class="form-control" id="floatingName" placeholder="Full Name">
                    <label for="floatingName">Full Name</label>
                </div>
            </div>
        </div>

        <div class="form-floating mb-3">
            <select class="form-select" id="floatingSelect">
                <option selected>Select an option</option>
                <option value="1">Option 1</option>
                <option value="2">Option 2</option>
                <option value="3">Option 3</option>
            </select>
            <label for="floatingSelect">Choose option</label>
        </div>

        <div class="form-floating">
            <textarea class="form-control" id="floatingTextarea" placeholder="Leave a comment here" style="height: 100px;"></textarea>
            <label for="floatingTextarea">Comments</label>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
